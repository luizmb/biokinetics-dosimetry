name: BiokineticsDosimetry

options:
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: io.lu.caixinhas

packages:
  BiokineticsDosimetryApp:
    path: .

targets:
  App:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
    dependencies:
      - package: BiokineticsDosimetryApp
        product: App.Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lu.caixinhas.BiokineticsDosimetry
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: ""
        ENABLE_TESTING_SEARCH_PATHS: YES

schemes:
  App:
    build:
      targets:
        App: all
    test:
      parallelizable: false
      targets:
        - package: BiokineticsDosimetryApp/EditorFeatureTests
        - package: BiokineticsDosimetryApp/CalculatorFeatureTests
        - package: BiokineticsDosimetryApp/AppCoreTests
